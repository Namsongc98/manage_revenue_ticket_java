services:
  # Node 1
  redis-node-1: &redis-base
    image: redis:7
    container_name: redis-node-1
    networks:
      - redis-cluster-net
    ports:
      - "7001:7001"
      - "17001:17001"
    command: >
      redis-server --port 7001
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --bind 0.0.0.0
      --cluster-announce-port 7001
      --cluster-announce-bus-port 17001

  # Node 2
  redis-node-2:
    <<: *redis-base
    container_name: redis-node-2
    ports:
      - "7002:7002"
